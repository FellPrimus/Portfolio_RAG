apiVersion: v1
kind: Secret
metadata:
  name: rag-service-secret
  namespace: portfolio
  labels:
    app: rag-service
type: Opaque
stringData:
  # CLOVA Studio
  CLOVASTUDIO_API_KEY: "your_clovastudio_api_key_here"
  CLOVASTUDIO_EMBEDDING_API_KEY: "your_clovastudio_embedding_api_key_here"

  # OpenAI (AI API Channel)
  OPENAI_API_KEY: "your_openai_api_key_here"
  OPENAI_BASE_URL: "https://api.openai.com/v1"

  # Qwen (Embedding & Reranker)
  QWEN_API_KEY: "your_qwen_api_key_here"
  QWEN_EMBEDDING_API_KEY: "your_qwen_api_key_here"
  QWEN_RERANKER_API_KEY: "your_qwen_api_key_here"

  # Tavily (Web Search)
  TAVILY_API_KEY: "your_tavily_api_key_here"
  WEB_SEARCH_API_KEY: "your_tavily_api_key_here"
