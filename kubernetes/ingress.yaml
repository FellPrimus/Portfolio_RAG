# Traefik Middleware for stripping /rag prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rag-stripprefix
  namespace: portfolio
spec:
  stripPrefix:
    prefixes:
      - /rag
---
# Ingress for Portfolio (default)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio
                port:
                  number: 80
---
# IngressRoute for RAG service with StripPrefix
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rag-service-route
  namespace: portfolio
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/rag`)
      kind: Rule
      services:
        - name: rag-service
          port: 5000
      middlewares:
        - name: rag-stripprefix
