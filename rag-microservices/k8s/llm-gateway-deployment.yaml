apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: rag-system
  labels:
    app: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: llm-gateway
          image: llm-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LOG_LEVEL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LLM_MODEL
            - name: LLM_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LLM_TEMPERATURE
            - name: LLM_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LLM_MAX_TOKENS
            - name: CLOVASTUDIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: CLOVASTUDIO_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: rag-system
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  selector:
    app: llm-gateway
