apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: rag-system
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: embedding-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LOG_LEVEL
            - name: EMBEDDING_MODEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: EMBEDDING_MODEL
          resources:
            requests:
              cpu: 2000m
              memory: 2Gi
            limits:
              cpu: 8000m
              memory: 4Gi
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
          livenessProbe:
            httpGet:
              path: /livez
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          startupProbe:
            httpGet:
              path: /livez
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: embedding-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: rag-system
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: embedding-service
