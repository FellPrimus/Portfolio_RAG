apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-system
  labels:
    app: rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: rag-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LOG_LEVEL
            - name: EMBEDDING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: EMBEDDING_SERVICE_URL
            - name: LLM_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LLM_GATEWAY_URL
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: QDRANT_HOST
            - name: QDRANT_PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: QDRANT_PORT
            - name: QDRANT_COLLECTION
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: QDRANT_COLLECTION
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: REDIS_PASSWORD
            - name: RAG_RETRIEVAL_K
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: RAG_RETRIEVAL_K
            - name: RAG_MIN_QUALITY_SCORE
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: RAG_MIN_QUALITY_SCORE
            - name: EMBEDDING_DIMENSION
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: EMBEDDING_DIMENSION
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: rag-system
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: rag-api
