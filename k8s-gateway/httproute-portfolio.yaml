---
# HTTPRoute for Portfolio namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-route
  namespace: portfolio
spec:
  parentRefs:
    - name: main-gateway
      namespace: kube-system
  rules:
    # DevLog API - /devlog/api/* → portfolio-api:8080
    # URL Rewrite: /devlog/api/posts → /api/posts
    - matches:
        - path:
            type: PathPrefix
            value: /devlog/api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - name: portfolio-api
          port: 8080

    # Static files - /* → portfolio:80 (lowest priority, catches all)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio
          port: 80
