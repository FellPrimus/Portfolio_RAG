---
# Gateway - лӘЁл“  л„Өмһ„мҠӨнҺҳмқҙмҠӨмқҳ HTTPRouteлҘј мҲҳлқҪ
# Traefik entrypoint 'web'мқҖ лӮҙл¶Җм ҒмңјлЎң port 8000 мӮ¬мҡ©
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: kube-system
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
